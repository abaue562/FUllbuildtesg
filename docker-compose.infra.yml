# ============================================================
# SHARED INFRASTRUCTURE LAYER
# Build these FIRST before picking a product vertical.
# They are used by: TikTok clone, ecom, telehealth, CRM app
# ============================================================

services:

  # ──────────────────────────────────────────────
  # SUPABASE — open source Firebase
  # Realtime DB + auth + storage + row-level security
  # Critical for: multi-tenant CRM, social platform feed
  # ──────────────────────────────────────────────
  supabase-db:
    image: supabase/postgres:15.1.0.147
    container_name: supabase-db
    networks: [oss-stack]
    environment:
      POSTGRES_PASSWORD: ${SUPABASE_DB_PASS:-your_super_secret_and_long_postgres_password}
      POSTGRES_DB: postgres
    volumes:
      - supabase-db:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  supabase-realtime:
    image: supabase/realtime:v2.28.32
    container_name: supabase-realtime
    networks: [oss-stack]
    depends_on:
      supabase-db:
        condition: service_healthy
    environment:
      DB_HOST: supabase-db
      DB_PORT: 5432
      DB_NAME: postgres
      DB_USER: postgres
      DB_PASSWORD: ${SUPABASE_DB_PASS:-your_super_secret_and_long_postgres_password}
      PORT: 4000
      JWT_SECRET: ${SUPABASE_JWT_SECRET:-your-super-secret-jwt-token-with-at-least-32-chars}
      REPLICATION_MODE: RLS
      REPLICATION_POLL_INTERVAL: 100
      SECURE_CHANNELS: "true"
      SLOT_NAME: supabase_realtime_rls
      TEMPORARY_SLOT: "true"
    restart: unless-stopped

  supabase-studio:
    image: supabase/studio:20240205-ce42139
    container_name: supabase-studio
    networks: [oss-stack]
    ports:
      - "3300:3000"
    environment:
      SUPABASE_URL: http://supabase-kong:8000
      STUDIO_PG_META_URL: http://supabase-meta:8080
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # MEILISEARCH — blazing fast search (Algolia OSS)
  # Sub-10ms, typo tolerance, facets, filters
  # Used by: every product (ecom search, directory, CRM)
  # ──────────────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: meilisearch
    networks: [oss-stack]
    ports:
      - "7700:7700"
    environment:
      - MEILI_MASTER_KEY=${MEILISEARCH_KEY:-change_me_master_key}
      - MEILI_ENV=production
      - MEILI_NO_ANALYTICS=true
    volumes:
      - meilisearch-data:/meili_data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # UNLEASH — feature flags (LaunchDarkly OSS)
  # Gate features by plan, user, percentage rollout
  # Used by: CRM app (plan gating), all products (A/B)
  # ──────────────────────────────────────────────
  unleash-db:
    image: postgres:15-alpine
    container_name: unleash-db
    networks: [oss-stack]
    environment:
      POSTGRES_DB: unleash
      POSTGRES_USER: unleash
      POSTGRES_PASSWORD: ${UNLEASH_DB_PASS:-unleash_secret}
    volumes:
      - unleash-db:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unleash"]
      interval: 10s
      retries: 5

  unleash:
    image: unleashorg/unleash-server:latest
    container_name: unleash
    networks: [oss-stack]
    depends_on:
      unleash-db:
        condition: service_healthy
    ports:
      - "4242:4242"
    environment:
      DATABASE_URL: postgres://unleash:${UNLEASH_DB_PASS:-unleash_secret}@unleash-db/unleash
      DATABASE_SSL: "false"
      INIT_FRONTEND_API_TOKENS: ${UNLEASH_FRONTEND_TOKEN:-default:development.unleash-insecure-frontend-api-token}
      INIT_CLIENT_API_TOKENS: ${UNLEASH_CLIENT_TOKEN:-default:development.unleash-insecure-api-token}
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # GLITCHTIP — error tracking (Sentry OSS)
  # Catch production errors before users notice
  # Used by: every product in production
  # ──────────────────────────────────────────────
  glitchtip-db:
    image: postgres:15-alpine
    container_name: glitchtip-db
    networks: [oss-stack]
    environment:
      POSTGRES_DB: glitchtip
      POSTGRES_USER: glitchtip
      POSTGRES_PASSWORD: ${GLITCHTIP_DB_PASS:-glitchtip_secret}
    volumes:
      - glitchtip-db:/var/lib/postgresql/data
    restart: unless-stopped

  glitchtip-redis:
    image: redis:7-alpine
    container_name: glitchtip-redis
    networks: [oss-stack]
    restart: unless-stopped

  glitchtip:
    image: glitchtip/glitchtip:latest
    container_name: glitchtip
    networks: [oss-stack]
    depends_on: [glitchtip-db, glitchtip-redis]
    ports:
      - "8200:8080"
    environment:
      DATABASE_URL: postgres://glitchtip:${GLITCHTIP_DB_PASS:-glitchtip_secret}@glitchtip-db/glitchtip
      REDIS_URL: redis://glitchtip-redis:6379
      SECRET_KEY: ${GLITCHTIP_SECRET:-change_me_glitchtip_secret}
      DEFAULT_FROM_EMAIL: ${SMTP_FROM:-noreply@yourapp.com}
      EMAIL_URL: smtp://${SMTP_USER}:${SMTP_PASS}@${SMTP_HOST}:${SMTP_PORT:-587}
      GLITCHTIP_DOMAIN: http://${SERVER_IP:-localhost}:8200
      DEFAULT_AUTO_FIELD: django.db.models.BigAutoField
      CELERY_WORKER_CONCURRENCY: 2
    restart: unless-stopped

  glitchtip-worker:
    image: glitchtip/glitchtip:latest
    container_name: glitchtip-worker
    networks: [oss-stack]
    depends_on: [glitchtip-db, glitchtip-redis]
    command: ./bin/run-celery-with-beat.sh
    environment:
      DATABASE_URL: postgres://glitchtip:${GLITCHTIP_DB_PASS:-glitchtip_secret}@glitchtip-db/glitchtip
      REDIS_URL: redis://glitchtip-redis:6379
      SECRET_KEY: ${GLITCHTIP_SECRET:-change_me_glitchtip_secret}
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # TEMPORAL — workflow orchestration
  # Durable execution for complex multi-step workflows
  # Used by: SaaS onboarding, payment flows, video processing
  # ──────────────────────────────────────────────
  temporal-db:
    image: postgres:15-alpine
    container_name: temporal-db
    networks: [oss-stack]
    environment:
      POSTGRES_DB: temporal
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: ${TEMPORAL_DB_PASS:-temporal_secret}
    volumes:
      - temporal-db:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 10s
      retries: 5

  temporal:
    image: temporalio/auto-setup:1.22.3
    container_name: temporal
    networks: [oss-stack]
    depends_on:
      temporal-db:
        condition: service_healthy
    ports:
      - "7233:7233"
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: ${TEMPORAL_DB_PASS:-temporal_secret}
      POSTGRES_SEEDS: temporal-db
    restart: unless-stopped

  temporal-ui:
    image: temporalio/ui:2.21.3
    container_name: temporal-ui
    networks: [oss-stack]
    depends_on: [temporal]
    ports:
      - "8088:8080"
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:8088
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # REDPANDA — event streaming (Kafka without JVM)
  # Real-time feeds, recommendation engine events
  # Used by: TikTok clone, viral ecom analytics
  # ──────────────────────────────────────────────
  redpanda:
    image: redpandadata/redpanda:v23.3.5
    container_name: redpanda
    networks: [oss-stack]
    ports:
      - "9092:9092"
      - "19092:19092"
      - "9644:9644"
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://${SERVER_IP:-localhost}:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://${SERVER_IP:-localhost}:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --smp 1
      - --memory 512M
      - --mode dev-container
      - --default-log-level=warn
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    restart: unless-stopped

  redpanda-console:
    image: redpandadata/console:v2.4.5
    container_name: redpanda-console
    networks: [oss-stack]
    depends_on: [redpanda]
    ports:
      - "8090:8080"
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
      KAFKA_BROKERS: redpanda:9092
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # POCKETBASE — instant backend for prototyping
  # Single binary: auth + DB + storage + realtime + API
  # Used for: rapid prototyping before full architecture
  # ──────────────────────────────────────────────
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: pocketbase
    networks: [oss-stack]
    ports:
      - "8091:8090"
    volumes:
      - pocketbase-data:/pb_data
    restart: unless-stopped

volumes:
  supabase-db:
  meilisearch-data:
  unleash-db:
  glitchtip-db:
  temporal-db:
  redpanda-data:
  pocketbase-data:
